<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Last Large Earthquake</title>

<meta name="viewport" content="width=800, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  background: transparent;
  font-family: Arial, sans-serif;
}

/* WRAPPER SCALE */
#scale {
  transform: scale(2);
  transform-origin: top left;
}

/* CONTAINER */
#bar {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  background: rgba(0,0,0,0.65);
  border-radius: 10px;
  backdrop-filter: blur(6px);
  box-shadow: 0 0 20px rgba(0,0,0,0.4);
}

/* LABEL */
.label {
  color: rgba(255,255,255,0.7);
  font-size: 13px;
  font-weight: bold;
  margin-right: 4px;
}

/* MAG BOX */
.mag {
  background: #ff2b2b;
  color: white;
  font-weight: bold;
  padding: 6px 10px;
  border-radius: 6px;
  min-width: 40px;
  text-align: center;
  box-shadow: 0 0 8px rgba(255,0,0,0.6);
}

/* LOCATION */
.place {
  color: white;
  font-weight: bold;
  font-size: 14px;
  max-width: 420px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* TIME BOX */
.time {
  background: white;
  color: black;
  font-weight: bold;
  padding: 6px 10px;
  border-radius: 6px;
  min-width: 90px;
  text-align: center;
}
</style>
</head>

<body>

<div id="scale">
  <div id="bar">
    <div class="label">LAST LARGE EARTHQUAKE</div>
    <div class="mag" id="mag">--</div>
    <div class="place" id="place">Loading...</div>
    <div class="time" id="time">--</div>
  </div>
</div>

<script>
const API_URL = "https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_day.geojson";

let quakeTime = null;

function formatTimeAgo(ms) {
  let sec = Math.floor(ms / 1000);
  let min = Math.floor(sec / 60);
  let hr = Math.floor(min / 60);

  if (hr > 0) return hr + "h " + (min % 60) + "m ago";
  if (min > 0) return min + "m " + (sec % 60) + "s ago";
  return sec + "s ago";
}

function loadData() {
  fetch(API_URL)
    .then(r => r.json())
    .then(data => {

      if (!data.features) return;

      let quake = data.features.find(f => {
        let mag = f.properties.mag;
        return mag != null && mag >= 5;
      });

      if (!quake) return;

      let mag = quake.properties.mag.toFixed(1);
      let place = quake.properties.place || "Unknown";
      let time = quake.properties.time;

      quakeTime = time;

      document.getElementById("mag").textContent = mag;
      document.getElementById("place").textContent = place;

    })
    .catch(err => console.log(err));
}

function updateTimer() {
  if (!quakeTime) return;

  let now = Date.now();
  let diff = now - quakeTime;

  document.getElementById("time").textContent = formatTimeAgo(diff);
}

loadData();
setInterval(loadData, 60000);
setInterval(updateTimer, 1000);
</script>

</body>
</html>
